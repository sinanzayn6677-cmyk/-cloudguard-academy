<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudGuard Academy - Cybersecurity Training Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        /* Navigation */
        nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.8;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5rem 2rem;
            text-align: center;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: slideDown 0.8s ease;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            max-width: 600px;
            opacity: 0.95;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }

        /* Features Section */
        .features {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 3rem;
            color: #333;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-10px);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .feature-card h3 {
            color: #667eea;
            margin-bottom: 1rem;
        }

        /* Labs Section */
        .labs {
            background: #f4f4f4;
            padding: 3rem 2rem;
        }

        .labs-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .labs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .lab-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .lab-card h4 {
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .lab-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 1rem 0;
        }

        /* Stats Section */
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-item h3 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-item p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Tech Stack */
        .tech-stack {
            padding: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tech-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .tech-item {
            padding: 1.5rem;
            border-radius: 10px;
            background: #f4f4f4;
            transition: background 0.3s;
        }

        .tech-item:hover {
            background: #667eea;
            color: white;
        }

        .tech-item h4 {
            margin-top: 1rem;
            color: #667eea;
        }

        .tech-item:hover h4 {
            color: white;
        }

        /* CTA Section */
        .cta {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 2rem;
            text-align: center;
        }

        .cta h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .cta p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            nav ul {
                gap: 1rem;
            }

            .section-title {
                font-size: 1.8rem;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">🛡️ CloudGuard Academy</div>
        <ul>
            <li><a href="#features">Features</a></li>
            <li><a href="#labs">Labs</a></li>
            <li><a href="#tech">Tech Stack</a></li>
            <li><a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>CloudGuard Academy</h1>
        <p>Master cybersecurity through hands-on interactive labs. Learn SQL Injection, XSS, CSRF, and IDOR attacks in a safe environment.</p>
        <div class="hero-buttons">
            <a href="http://localhost:5173" class="btn btn-primary">Launch App</a>
            <a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy" class="btn btn-secondary" target="_blank">View on GitHub</a>
        </div>
    </section>

    <!-- Features Section -->
    <section class="features" id="features">
        <h2 class="section-title">Features</h2>
        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">📚</div>
                <h3>4 Security Labs</h3>
                <p>Interactive labs covering SQL Injection, XSS, CSRF, and IDOR vulnerabilities</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">💻</div>
                <h3>Vulnerable & Secure Modes</h3>
                <p>Compare vulnerable code with secure implementations side-by-side</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🏆</div>
                <h3>Leaderboard System</h3>
                <p>Compete with other learners and track your progress globally</p>
            </div>
            <div class="feature-card">
                <div class="feature-icon">⭐</div>
                <h3>Gamification</h3>
                <p>Earn points for each completed lab and unlock achievements</p>
            </div>
        </div>
    </section>

    <!-- Labs Section -->
    <section class="labs" id="labs">
        <div class="labs-container">
            <h2 class="section-title">Security Labs</h2>
            <div class="labs-grid">
                <div class="lab-card">
                    <h4>🔐 SQL Injection</h4>
                    <p>Learn to exploit and prevent SQL injection vulnerabilities. Master parameterized queries and safe database access patterns.</p>
                    <span class="lab-badge">100 Points</span>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Beginner</p>
                </div>
                <div class="lab-card">
                    <h4>🎯 Cross-Site Scripting</h4>
                    <p>Understand XSS attacks through DOM-based exploitation. Learn HTML entity encoding and input validation.</p>
                    <span class="lab-badge">100 Points</span>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Beginner</p>
                </div>
                <div class="lab-card">
                    <h4>⚔️ CSRF Attack</h4>
                    <p>Master cross-site request forgery attacks. Learn token-based protection mechanisms and secure request validation.</p>
                    <span class="lab-badge">100 Points</span>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Intermediate</p>
                </div>
                <div class="lab-card">
                    <h4>🔓 IDOR Attack</h4>
                    <p>Discover Insecure Direct Object Reference vulnerabilities. Learn authorization bypass and access control.</p>
                    <span class="lab-badge">150 Points</span>
                    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Intermediate</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Stats Section -->
    <section class="stats">
        <div class="stats-grid">
            <div class="stat-item">
                <h3>450+</h3>
                <p>Total Points</p>
            </div>
            <div class="stat-item">
                <h3>4</h3>
                <p>Security Labs</p>
            </div>
            <div class="stat-item">
                <h3>100%</h3>
                <p>Free Access</p>
            </div>
            <div class="stat-item">
                <h3>∞</h3>
                <p>Learning</p>
            </div>
        </div>
    </section>

    <!-- Tech Stack -->
    <section class="tech-stack" id="tech">
        <h2 class="section-title">Tech Stack</h2>
        <div class="tech-grid">
            <div class="tech-item">
                <div style="font-size: 2rem;">⚛️</div>
                <h4>React 19</h4>
                <p>Modern UI library</p>
            </div>
            <div class="tech-item">
                <div style="font-size: 2rem;">🟢</div>
                <h4>Node.js</h4>
                <p>Backend runtime</p>
            </div>
            <div class="tech-item">
                <div style="font-size: 2rem;">📘</div>
                <h4>TypeScript</h4>
                <p>Type safety</p>
            </div>
            <div class="tech-item">
                <div style="font-size: 2rem;">🎨</div>
                <h4>Tailwind CSS</h4>
                <p>Styling framework</p>
            </div>
            <div class="tech-item">
                <div style="font-size: 2rem;">🗄️</div>
                <h4>SQLite</h4>
                <p>Database</p>
            </div>
            <div class="tech-item">
                <div style="font-size: 2rem;">🔐</div>
                <h4>JWT Auth</h4>
                <p>Security tokens</p>
            </div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="cta">
        <h2>Ready to Learn Cybersecurity?</h2>
        <p>Start mastering web security through hands-on interactive labs today!</p>
        <a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy" class="btn btn-primary" target="_blank">Clone on GitHub</a>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 CloudGuard Academy. Built by <a href="https://github.com/sinanzayn6677-cmyk">Sinan Zayn</a></p>
        <p><a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy">Repository</a> | 
           <a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy/issues">Issues</a> | 
           <a href="https://github.com/sinanzayn6677-cmyk/cloudguard-academy/blob/main/LICENSE">License</a>
        </p>
    </footer>
</body>
</html>
